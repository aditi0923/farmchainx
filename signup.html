<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmchainX Signup</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<nav class="navbar">

<h2 class="logo">FarmchainX</h2>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">How it works</a></li>
</ul>

<div class="auth-buttons">
<a href="login.html" class="btn login">Login</a>
<a href="signup.html" class="btn register">Register</a>
</div>

</nav>
</header>

<section class="form-section">

<div class="form-container">

<h2>Signup for FarmchainX</h2>

<form onsubmit="redirectDashboard(event)">

<label>Full Name</label>
<input type="text" placeholder="Enter full name" required>

<label>Email</label>
<input type="email" placeholder="Enter email" required>

<label>Password</label>
<input type="password" placeholder="Create password" required>

<label>Confirm Password</label>
<input type="password" placeholder="Confirm password" required>

<label>Select Role</label>

<select id="role">
<option>Farmer</option>
<option>Consumer</option>
<option>Transporter</option>
<option>Admin</option>
</select>

<button type="submit" class="primary-btn">Signup</button>

<p>Already have an account? <a href="login.html">Login</a></p>

</form>

</div>

</section>

<script>

function redirectDashboard(event){

event.preventDefault();

let role = document.getElementById("role").value;

if(role === "Farmer"){
window.location.href = "farmerdashboard.html";
}

else if(role === "Consumer"){
window.location.href = "consumer.html";
}

else if(role === "Transporter"){
window.location.href = "transporter.html";
}

else{
window.location.href = "admin.html";
}

}

</script>
</body>
</html>
