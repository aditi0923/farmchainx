<!DOCTYPE html>
<html>
<head>
    <title>Edit Crop</title>
</head>
<link rel="stylesheet" href="styles.css">
<body>

<h2>Edit Crop</h2>

<form id="editForm">
    <input type="text" id="cropName" placeholder="Crop Name"><br><br>
    <input type="number" id="quantity" placeholder="Quantity"><br><br>
    <input type="number" id="price" placeholder="Price"><br><br>
    <input type="text" id="location" placeholder="Location"><br><br>

    <button type="submit">Update Crop </button>
</form>

<p id="msg"></p>

<script>
const urlParams = new URLSearchParams(window.location.search);
const id = urlParams.get("id");

// LOAD OLD DATA
fetch(`http://localhost:8080/api/crops/${id}`)
.then(res => res.json())
.then(data => {
    document.getElementById("cropName").value = data.cropName;
    document.getElementById("quantity").value = data.quantity;
    document.getElementById("price").value = data.price;
    document.getElementById("location").value = data.location;
});

// UPDATE
document.getElementById("editForm").addEventListener("submit", function(e){
    e.preventDefault();

    const updatedCrop = {
        cropName: document.getElementById("cropName").value,
        quantity: document.getElementById("quantity").value,
        price: document.getElementById("price").value,
        location: document.getElementById("location").value
    };

    fetch(`http://localhost:8080/api/crops/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(updatedCrop)
    })
    .then(res => res.json())
    .then(() => {
        document.getElementById("msg").innerText = "Updated successfully ✅";
        window.location.href = "farmerdashboard.html";
    });
});


</script>

</body>
</html>
