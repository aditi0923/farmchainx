<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmchainX Consumer Dashboard</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
<nav class="navbar">

<h2 class="logo">FarmchainX</h2>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="#">Products</a></li>
<li><a href="#">My Orders</a></li>
</ul>

<div class="auth-buttons">
<a href="index.html" class="btn login">Logout</a>
</div>

</nav>
</header>

<section class="dashboard">

<h1>Consumer Dashboard</h1>
<p>Explore fresh farm products directly from farmers.</p>

<div class="dashboard-cards">

<div class="card">
<h3>Total Orders</h3>
<p>5</p>
</div>

<div class="card">
<h3>Products Purchased</h3>
<p>12</p>
</div>

<div class="card">
<h3>Total Spent</h3>
<p>₹4,200</p>
</div>

</div>


<div class="product-section">

<h2>Available Farm Products</h2>

<table>
<thead>
<tr>
<th>ID</th>
<th>Product</th>
<th>Price</th>
<th>Action</th>
</tr>
</thead>


<tbody id="productTable"></tbody>
</table>

</div>

</section>

<script>

let email = localStorage.getItem("email");

if(!email){
    window.location.href = "login.html";
}

// LOAD PRODUCTS
function loadProducts() {

    fetch("http://localhost:8080/api/crops")
    .then(res => res.json())
    .then(data => {

        let table = document.getElementById("productTable");
        table.innerHTML = "";

        if(data.length === 0){
            table.innerHTML = "<tr><td colspan='4'>No products available</td></tr>";
            return;
        }

        data.forEach(crop => {
            table.innerHTML += `
            <tr>
                <td>${crop.id}</td>
                <td>${crop.cropName}</td>
                <td>₹${crop.price}</td>
                <td>
                    <button onclick="buyProduct(${crop.id})"> Buy
                    </button>
                </td>
            </tr>
            `;
        });

    })
    .catch(() => {
        alert("Error loading products ❌");
    });
}

function buyProduct(id){

    let quantity = prompt("Enter quantity:");

    if(!quantity) return;
    
    alert(`
    Payment Successful 💳
    Order placed!
    Product ID: ${id}
    Quantity: ${quantity}
     `);
    fetch("http://localhost:8080/api/orders", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            cropId: id,
            quantity: quantity,
            consumerEmail: localStorage.getItem("email")
        })
    })
    .then(res => res.json())
    .then(() => {
        alert("Order placed successfully ✅");
    })
    .catch(() => {
        alert("Error placing order ❌");
    });
}

// INIT
loadProducts();

</script>

</body>
</html>
